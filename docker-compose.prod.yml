services:
  mysql:
    image: mysql:8.4
    container_name: tarkov_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --port=${MYSQL_PORT:-3306}
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_BIND_ADDRESS:-127.0.0.1}:${MYSQL_PORT:-3306}:${MYSQL_PORT:-3306}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -P ${MYSQL_PORT:-3306} -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - internal

  app:
    image: ${APP_IMAGE_REPOSITORY:-luopc1218docker/tarkov-tactical-board-server}:${APP_IMAGE_TAG:-latest}
    container_name: tarkov_app
    pull_policy: always
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-18080}:${SERVER_PORT:-8080}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-mysql}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SERVER_SERVLET_CONTEXT_PATH: ${SERVER_SERVLET_CONTEXT_PATH:-}
      APP_AUTH_ADMINUSERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_AUTH_ADMINPASSWORDHASH: ${APP_ADMIN_PASSWORD_HASH}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRESECONDS: ${APP_JWT_EXPIRESECONDS:-7200}
    networks:
      - internal

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
